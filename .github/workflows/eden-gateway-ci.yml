name: Eden Gateway CI

on:
  pull_request:
    paths:
      - "services/eden-gateway/**"
      - ".github/workflows/eden-gateway-ci.yml"
  push:
    branches:
      - main
      - codex/reconcile-voice-agent-docs
    paths:
      - "services/eden-gateway/**"
      - ".github/workflows/eden-gateway-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/eden-gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/eden-gateway/package-lock.json

      - name: Install
        run: npm ci

      - name: Syntax check
        run: npm run check
