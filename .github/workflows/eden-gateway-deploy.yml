name: Deploy Eden Gateway

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag. Defaults to gateway-<run_id>-<sha>."
        required: false
        type: string
      environment:
        description: "GitHub environment to deploy through."
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
    paths:
      - ".github/workflows/eden-gateway-deploy.yml"
      - "services/eden-gateway/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: eden-gateway-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

env:
  SERVICE_DIR: services/eden-gateway
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP || 'wrkflo-ai-rg' }}
  AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP || 'wrkflo-google-webhooks' }}
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME || 'cafe61646254acr' }}
  AZURE_ACR_LOGIN_SERVER: ${{ vars.AZURE_ACR_LOGIN_SERVER || 'cafe61646254acr.azurecr.io' }}
  IMAGE_REPOSITORY: ${{ vars.IMAGE_REPOSITORY || 'wrkflo-google-webhooks' }}
  HEALTH_URL: ${{ vars.HEALTH_URL || 'https://wrkflo-google-webhooks.jollymeadow-ec18f10e.eastus.azurecontainerapps.io/health' }}

jobs:
  deploy:
    name: Build And Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Node syntax
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ env.SERVICE_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm ci

      - name: Check server syntax
        working-directory: ${{ env.SERVICE_DIR }}
        run: npm run check

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Azure Container Apps CLI
        run: az extension add --name containerapp --upgrade

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            tag="${{ inputs.image_tag }}"
          else
            tag="gateway-${GITHUB_RUN_ID}-${GITHUB_SHA::7}"
          fi
          image="${AZURE_ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Build image
        working-directory: ${{ env.SERVICE_DIR }}
        run: docker build --tag "${{ steps.image.outputs.image }}" .

      - name: Push image to ACR
        run: |
          az acr login --name "$AZURE_ACR_NAME"
          docker push "${{ steps.image.outputs.image }}"

      - name: Update Container App image
        run: |
          az containerapp update \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_CONTAINER_APP" \
            --image "${{ steps.image.outputs.image }}"

      - name: Smoke check health endpoint
        shell: bash
        run: |
          for attempt in {1..12}; do
            if curl -fsS "$HEALTH_URL"; then
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed: $HEALTH_URL" >&2
          exit 1

      - name: Report deployed image
        run: echo "Deployed ${{ steps.image.outputs.image }}"
